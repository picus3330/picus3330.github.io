<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Blitz Arena</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Import map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="top-bar">
                <div class="health-container">
                    <div id="health-bar"></div>
                </div>
                <div class="score">Score: <span id="score-val">0</span></div>
            </div>
            <div class="bottom-bar">
                <div class="ability-cooldown">
                    Dash: <span id="dash-status">Ready</span>
                </div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu" class="menu screen active">
            <h1>NEON BLITZ</h1>
            <p>WASD to Move | Mouse to Aim | Left Click to Shoot | SPACE to Dash</p>
            <button id="btn-start">START GAME</button>
        </div>

        <!-- Pause Menu -->
        <div id="pause-menu" class="menu screen hidden">
            <h1>PAUSED</h1>
            <button id="btn-resume">RESUME</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-menu" class="menu screen hidden">
            <h1>SYSTEM FAILURE</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="btn-restart">REBOOT</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
