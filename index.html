<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrawlArena 3D</title>
<style>
/* ═══════════════════════════════════════════════════════
   GLOBAL RESET & FONTS
   ═══════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;600;700&display=swap');

:root {
  --col-bg: #0a0e17;
  --col-panel: rgba(10, 14, 23, 0.92);
  --col-accent: #ff4d4d;
  --col-accent2: #ffd700;
  --col-accent3: #00e5ff;
  --col-text: #e8e8e8;
  --col-hp: #2ecc40;
  --col-dmg: #ff4136;
  --col-tank: #e74c3c;
  --col-sniper: #3498db;
  --col-balanced: #2ecc71;
  --font-title: 'Bungee', cursive;
  --font-body: 'Chakra Petch', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: var(--col-bg);
  font-family: var(--font-body);
  color: var(--col-text);
  cursor: crosshair;
}
canvas { display: block; }

/* ═══════════════════════════════════════════════════════
   START MENU
   ═══════════════════════════════════════════════════════ */
#startMenu {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0a0e17 0%, #1a1040 50%, #0a0e17 100%);
  z-index: 100;
  gap: 30px;
}
#startMenu .logo {
  font-family: var(--font-title);
  font-size: clamp(40px, 8vw, 80px);
  background: linear-gradient(135deg, var(--col-accent), var(--col-accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  filter: drop-shadow(0 4px 20px rgba(255,77,77,0.4));
  letter-spacing: 3px;
}
#startMenu .subtitle {
  font-size: 16px;
  color: #888;
  margin-top: -20px;
  letter-spacing: 4px;
  text-transform: uppercase;
}

/* Character cards */
.char-select {
  display: flex; gap: 20px;
  flex-wrap: wrap; justify-content: center;
  max-width: 750px;
}
.char-card {
  width: 210px;
  background: var(--col-panel);
  border: 2px solid #222;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.char-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, var(--card-glow, transparent) , transparent 70%);
  opacity: 0.15;
}
.char-card:hover, .char-card.selected {
  border-color: var(--col-accent2);
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(255,215,0,0.2);
}
.char-card.selected::after {
  content: '✓';
  position: absolute; top: 10px; right: 14px;
  font-size: 20px; color: var(--col-accent2);
  font-weight: bold;
}
.char-card h3 {
  font-family: var(--font-title);
  font-size: 18px;
  margin-bottom: 8px;
}
.char-card .char-icon {
  width: 60px; height: 60px;
  border-radius: 50%;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.char-card .stats {
  font-size: 12px;
  text-align: left;
  line-height: 1.8;
}
.stat-bar {
  height: 6px;
  background: #222;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 2px;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}

/* Mode select */
.mode-select {
  display: flex; gap: 14px;
}
.mode-btn {
  padding: 12px 28px;
  background: transparent;
  border: 2px solid #444;
  border-radius: 10px;
  color: var(--col-text);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.mode-btn:hover, .mode-btn.selected {
  border-color: var(--col-accent3);
  color: var(--col-accent3);
  box-shadow: 0 0 20px rgba(0,229,255,0.15);
}

/* Start button */
.start-btn {
  padding: 16px 60px;
  background: linear-gradient(135deg, var(--col-accent), #ff8800);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: var(--font-title);
  font-size: 22px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}
.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 30px rgba(255,77,77,0.4);
}

/* ═══════════════════════════════════════════════════════
   HUD (IN-GAME UI)
   ═══════════════════════════════════════════════════════ */
#hud {
  display: none;
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}
#hud * { pointer-events: none; }

.hud-top {
  position: absolute;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 20px;
  align-items: center;
  background: var(--col-panel);
  padding: 8px 24px;
  border-radius: 12px;
  border: 1px solid #222;
}
.hud-score {
  font-family: var(--font-title);
  font-size: 20px;
}
.hud-mode {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.hud-timer {
  font-family: var(--font-title);
  color: var(--col-accent2);
  font-size: 18px;
}

.hud-bottom {
  position: absolute;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: flex-end;
  gap: 16px;
}

.hp-container {
  width: 260px;
  text-align: center;
}
.hp-label {
  font-size: 11px;
  margin-bottom: 4px;
  color: #aaa;
  letter-spacing: 1px;
}
.hp-bar-outer {
  height: 18px;
  background: #1a1a2e;
  border-radius: 9px;
  overflow: hidden;
  border: 1px solid #333;
}
.hp-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--col-hp), #27ae60);
  border-radius: 9px;
  transition: width 0.2s;
  position: relative;
}
.hp-text {
  font-family: var(--font-title);
  font-size: 11px;
  position: absolute;
  right: 8px; top: 1px;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

.cooldown-container {
  display: flex; gap: 10px;
}
.cd-slot {
  width: 50px; height: 50px;
  background: var(--col-panel);
  border: 2px solid #333;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.cd-slot .cd-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7);
  transition: height 0.1s;
}
.cd-slot .cd-label {
  font-size: 9px;
  color: #888;
  z-index: 1;
}
.cd-slot .cd-icon {
  font-size: 18px;
  z-index: 1;
}

.hud-kills {
  position: absolute;
  top: 16px; right: 20px;
  background: var(--col-panel);
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid #222;
  font-size: 13px;
}

.hud-gems {
  position: absolute;
  top: 16px; left: 20px;
  background: var(--col-panel);
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid #222;
  font-size: 13px;
  display: none;
}

/* Kill feed */
#killFeed {
  position: absolute;
  top: 60px; right: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kill-msg {
  background: var(--col-panel);
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  animation: fadeSlide 3s forwards;
  white-space: nowrap;
}
@keyframes fadeSlide {
  0% { opacity: 0; transform: translateX(20px); }
  10% { opacity: 1; transform: translateX(0); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-10px); }
}

/* Damage numbers */
.dmg-number {
  position: fixed;
  font-family: var(--font-title);
  font-size: 18px;
  color: var(--col-dmg);
  pointer-events: none;
  z-index: 20;
  animation: dmgFloat 0.8s forwards;
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}
@keyframes dmgFloat {
  0% { opacity: 1; transform: translateY(0) scale(1.2); }
  100% { opacity: 0; transform: translateY(-40px) scale(0.8); }
}

/* Respawn overlay */
#respawnOverlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 50;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#respawnOverlay .respawn-text {
  font-family: var(--font-title);
  font-size: 32px;
  color: var(--col-accent);
}
#respawnOverlay .respawn-timer {
  font-family: var(--font-title);
  font-size: 60px;
  color: #fff;
}

/* End screen */
#endScreen {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10, 14, 23, 0.95);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#endScreen .end-title {
  font-family: var(--font-title);
  font-size: clamp(36px, 6vw, 64px);
}
#endScreen .end-stats {
  font-size: 16px;
  text-align: center;
  line-height: 2;
}
.play-again-btn {
  padding: 14px 50px;
  background: linear-gradient(135deg, var(--col-accent3), #0077ff);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: var(--font-title);
  font-size: 18px;
  cursor: pointer;
  pointer-events: all;
  transition: all 0.2s;
}
.play-again-btn:hover {
  transform: scale(1.05);
}

/* Minimap */
#minimap {
  position: absolute;
  bottom: 20px; right: 20px;
  width: 140px; height: 140px;
  background: rgba(10,14,23,0.85);
  border: 1px solid #333;
  border-radius: 8px;
  overflow: hidden;
}
#minimapCanvas { width: 100%; height: 100%; }

/* Mobile controls hint */
.controls-hint {
  position: absolute;
  bottom: 90px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #555;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<!-- ═══════════════ START MENU ═══════════════ -->
<div id="startMenu">
  <div class="logo">BRAWL ARENA</div>
  <div class="subtitle">3D Browser Game</div>

  <div class="char-select" id="charSelect">
    <div class="char-card" data-char="tank" style="--card-glow: var(--col-tank);" onclick="selectChar('tank')">
      <div class="char-icon" style="background:var(--col-tank);">🛡</div>
      <h3 style="color:var(--col-tank)">TANK</h3>
      <div class="stats">
        <div>HP <div class="stat-bar"><div class="stat-bar-fill" style="width:100%;background:var(--col-tank)"></div></div></div>
        <div>DMG <div class="stat-bar"><div class="stat-bar-fill" style="width:40%;background:var(--col-accent2)"></div></div></div>
        <div>SPD <div class="stat-bar"><div class="stat-bar-fill" style="width:30%;background:var(--col-accent3)"></div></div></div>

      </div>

      <h3 style="color:var(--col-balanced)">FIGHTER</h3>
      <div class="stats">
        <div>HP <div class="stat-bar"><div class="stat-bar-fill" style="width:60%;background:var(--col-tank)"></div></div></div>
        <div>DMG <div class="stat-bar"><div class="stat-bar-fill" style="width:60%;background:var(--col-accent2)"></div></div></div>
        <div>SPD <div class="stat-bar"><div class="stat-bar-fill" style="width:60%;background:var(--col-accent3)"></div></div></div>
        <div>RNG <div class="stat-bar"><div class="stat-bar-fill" style="width:55%;background:#9b59b6"></div></div></div>
      </div>
    </div>
    <div class="char-card" data-char="sniper" style="--card-glow: var(--col-sniper);" onclick="selectChar('sniper')">
      <div class="char-icon" style="background:var(--col-sniper);">🎯</div>
      <h3 style="color:var(--col-sniper)">SNIPER</h3>
      <div class="stats">
        <div>HP <div class="stat-bar"><div class="stat-bar-fill" style="width:35%;background:var(--col-tank)"></div></div></div>
        <div>DMG <div class="stat-bar"><div class="stat-bar-fill" style="width:90%;background:var(--col-accent2)"></div></div></div>
        <div>SPD <div class="stat-bar"><div class="stat-bar-fill" style="width:70%;background:var(--col-accent3)"></div></div></div>
        <div>RNG <div class="stat-bar"><div class="stat-bar-fill" style="width:95%;background:#9b59b6"></div></div></div>
      </div>
    </div>
  </div>

  <div class="mode-select">
    <button class="mode-btn selected" data-mode="deathmatch" onclick="selectMode('deathmatch')">💀 DEATHMATCH</button>
    <button class="mode-btn" data-mode="gemgrab" onclick="selectMode('gemgrab')">💎 GEM GRAB</button>
  </div>

  <button class="start-btn" onclick="startGame()">HRÁT</button>
</div>

<!-- ═══════════════ HUD ═══════════════ -->
<div id="hud">
  <div class="hud-top">
    <span class="hud-mode" id="hudMode">DEATHMATCH</span>
    <span class="hud-timer" id="hudTimer">2:00</span>
    <span class="hud-score" id="hudScore"></span>
  </div>

  <div class="hud-kills" id="hudKills">Kills: 0</div>
  <div class="hud-gems" id="hudGems">💎 0</div>

  <div class="hud-bottom">
    <div class="cooldown-container">
      <div class="cd-slot" id="cdAttack">
        <span class="cd-icon">🔫</span>
        <span class="cd-label">LMB</span>
        <div class="cd-overlay" id="cdAttackOverlay"></div>
      </div>
      <div class="cd-slot" id="cdSpecial">
        <span class="cd-icon">⚡</span>
        <span class="cd-label">RMB/E</span>

      </div>
    </div>
    <div class="hp-container">
      <div class="hp-label">HEALTH</div>
      <div class="hp-bar-outer">
        <div class="hp-bar-inner" id="hpBar" style="width:100%">
          <span class="hp-text" id="hpText">100/100</span>
        </div>
      </div>
    </div>
  </div>

  <div id="killFeed"></div>
  <div class="controls-hint">WASD pohyb · Myš míření · LMB střelba · RMB/E speciál</div>

  <div id="minimap">
    <canvas id="minimapCanvas" width="140" height="140"></canvas>
  </div>
</div>

<!-- ═══════════════ RESPAWN OVERLAY ═══════════════ -->
<div id="respawnOverlay">
  <div class="respawn-text">ELIMINOVÁN</div>
  <div class="respawn-timer" id="respawnTimer">3</div>
</div>

<!-- ═══════════════ END SCREEN ═══════════════ -->
<div id="endScreen">
  <div class="end-title" id="endTitle">VÍTĚZSTVÍ!</div>
  <div class="end-stats" id="endStats"></div>
  <button class="play-again-btn" onclick="backToMenu()">ZPĚT DO MENU</button>
</div>

<!-- ═══════════════ THREE.JS ═══════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ╔═══════════════════════════════════════════════════════════════╗
// ║                    BRAWL ARENA 3D                            ║
// ║           Inspired by Brawl Stars – Three.js Game            ║
// ╚═══════════════════════════════════════════════════════════════╝

// ─── AUDIO SYSTEM (Web Audio API synth) ─────────────────────────
const AudioSys = {
  ctx: null,
  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  play(type) {
    if (!this.ctx) this.init();
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    switch(type) {
      case 'shoot':
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
        break;
      case 'hit':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.12);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'death':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
      case 'special':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.1);
        osc.frequency.linearRampToValueAtTime(400, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'gem':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.setValueAtTime(1000, now + 0.05);
        osc.frequency.setValueAtTime(1200, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
    }
  }
};

// ─── CHARACTER DEFINITIONS ──────────────────────────────────────
const CHARS = {
  tank: {
    name: 'Tank', hp: 200, speed: 3.5, damage: 30, attackCooldown: 0.7,
    specialDamage: 60, specialCooldown: 4, range: 7, specialRange: 5,
    projectileSpeed: 14, color: 0xe74c3c, bodyScale: 1.3,
    buildModel: buildTankModel
  },
  balanced: {
    name: 'Fighter', hp: 130, speed: 4.5, damage: 35, attackCooldown: 0.55,
    specialDamage: 80, specialCooldown: 5, range: 12, specialRange: 10,
    projectileSpeed: 18, color: 0x2ecc71, bodyScale: 1.0,
    buildModel: buildBalancedModel
  },
  sniper: {
    name: 'Sniper', hp: 80, speed: 5, damage: 55, attackCooldown: 1.2,
    specialDamage: 100, specialCooldown: 6, range: 22, specialRange: 20,
    projectileSpeed: 28, color: 0x3498db, bodyScale: 0.85,
    buildModel: buildSniperModel
  }
};

// ─── MODEL BUILDERS ─────────────────────────────────────────────
function buildTankModel(color) {
  const g = new THREE.Group();
  // Body – wide box
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 1.0, 1.2),
    new THREE.MeshStandardMaterial({ color, roughness: 0.5 })
  );
  body.position.y = 0.5;
  body.castShadow = true;
  g.add(body);
  // Head – sphere
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.45, 12, 10),
    new THREE.MeshStandardMaterial({ color: 0xf5c6aa, roughness: 0.6 })
  );
  head.position.y = 1.25;
  head.castShadow = true;
  g.add(head);
  // Shoulder pads
  [-0.7, 0.7].forEach(x => {
    const pad = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.4, metalness: 0.5 })
    );
    pad.position.set(x, 0.85, 0);
    pad.castShadow = true;
    g.add(pad);
  });
  // Gun barrel – short cylinder
  const barrel = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.15, 0.8, 8),
    new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6 })
  );
  barrel.rotation.x = Math.PI / 2;
  barrel.position.set(0, 0.6, 0.8);
  g.add(barrel);
  return g;
}

function buildBalancedModel(color) {
  const g = new THREE.Group();
  // Body – cylinder
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.45, 1.0, 10),
    new THREE.MeshStandardMaterial({ color, roughness: 0.5 })
  );
  body.position.y = 0.5;
  body.castShadow = true;
  g.add(body);
  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 12, 10),
    new THREE.MeshStandardMaterial({ color: 0xf5c6aa, roughness: 0.6 })
  );
  head.position.y = 1.25;
  head.castShadow = true;
  g.add(head);
  // Hat
  const hat = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.4, 0.25, 10),
    new THREE.MeshStandardMaterial({ color: 0x333333 })
  );
  hat.position.y = 1.6;
  g.add(hat);
  // Gun
  const barrel = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 0.1, 1.0),
    new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5 })
  );
  barrel.position.set(0.3, 0.55, 0.6);
  g.add(barrel);
  return g;
}

function buildSniperModel(color) {
  const g = new THREE.Group();
  // Body – slim
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.6, 0.9, 0.5),
    new THREE.MeshStandardMaterial({ color, roughness: 0.5 })
  );
  body.position.y = 0.45;
  body.castShadow = true;
  g.add(body);
  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 12, 10),
    new THREE.MeshStandardMaterial({ color: 0xf5c6aa, roughness: 0.6 })
  );
  head.position.y = 1.15;
  head.castShadow = true;
  g.add(head);
  // Scope / visor
  const visor = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.12, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x00e5ff, emissive: 0x00e5ff, emissiveIntensity: 0.5 })
  );
  visor.position.set(0, 1.2, 0.3);
  g.add(visor);
  // Long rifle
  const rifle = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.08, 1.6),

  );
  rifle.position.set(0.2, 0.5, 0.9);
  g.add(rifle);

  const scope = new THREE.Mesh(

  );
  scope.position.set(0.2, 0.62, 0.9);
  g.add(scope);

}

// ─── HEALTH BAR (3D – above characters) ─────────────────────────
function createHealthBar() {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 16;
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.scale.set(1.5, 0.22, 1);
  sprite.userData.canvas = canvas;
  sprite.userData.texture = tex;
  return sprite;
}

function updateHealthBar(sprite, hp, maxHp) {
  const c = sprite.userData.canvas;
  const ctx = c.getContext('2d');
  const pct = Math.max(0, hp / maxHp);
  ctx.clearRect(0, 0, 128, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.roundRect(0, 0, 128, 16, 4);
  ctx.fill();
  const col = pct > 0.5 ? '#2ecc40' : pct > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.roundRect(2, 2, (124) * pct, 12, 3);
  ctx.fill();
  sprite.userData.texture.needsUpdate = true;
}

// ─── GAME STATE ─────────────────────────────────────────────────
let selectedChar = 'balanced';
let selectedMode = 'deathmatch';
let scene, camera, renderer, clock;
let player, bots = [], projectiles = [], gems = [];
let mapWalls = [], mapBushes = [];
let keys = {};
let mouse = new THREE.Vector2();
let raycaster = new THREE.Raycaster();
let groundPlane;
let gameRunning = false;
let gameTime = 120; // seconds
let playerKills = 0;
let playerGems = 0;
let minimapCtx;
const MAP_SIZE = 40;
const RESPAWN_TIME = 3;

// ─── MENU FUNCTIONS ─────────────────────────────────────────────
function selectChar(c) {
  selectedChar = c;
  document.querySelectorAll('.char-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.char === c);
  });
}

function selectMode(m) {
  selectedMode = m;
  document.querySelectorAll('.mode-btn').forEach(el => {
    el.classList.toggle('selected', el.dataset.mode === m);
  });
}

function backToMenu() {
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('startMenu').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  gameRunning = false;
  // Clean up scene
  if (renderer) {
    renderer.dispose();
    renderer.domElement.remove();
  }
  scene = null;
  bots = []; projectiles = []; gems = [];
  mapWalls = []; mapBushes = [];
}

// ─── MAIN GAME INIT ─────────────────────────────────────────────
function startGame() {
  document.getElementById('startMenu').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('respawnOverlay').style.display = 'none';

  // Reset state
  playerKills = 0;
  playerGems = 0;
  gameTime = 120;
  projectiles = [];
  bots = [];
  gems = [];
  mapWalls = [];
  mapBushes = [];

  // Mode UI
  const isGem = selectedMode === 'gemgrab';
  document.getElementById('hudMode').textContent = isGem ? 'GEM GRAB' : 'DEATHMATCH';
  document.getElementById('hudGems').style.display = isGem ? 'block' : 'none';
  document.getElementById('hudKills').textContent = 'Kills: 0';
  document.getElementById('hudGems').textContent = '💎 0';

  AudioSys.init();
  initScene();
  initMap();
  initPlayer();
  initBots();
  if (isGem) initGems();
  initMinimap();

  gameRunning = true;
  clock = new THREE.Clock();
  animate();
}

// ─── SCENE SETUP ────────────────────────────────────────────────
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 18, 14);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Lights
  const amb = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(amb);

  const dir = new THREE.DirectionalLight(0xffeedd, 0.9);
  dir.position.set(10, 20, 10);
  dir.castShadow = true;
  dir.shadow.mapSize.set(2048, 2048);
  dir.shadow.camera.left = -MAP_SIZE/2;
  dir.shadow.camera.right = MAP_SIZE/2;
  dir.shadow.camera.top = MAP_SIZE/2;
  dir.shadow.camera.bottom = -MAP_SIZE/2;
  scene.add(dir);

  const hemi = new THREE.HemisphereLight(0x6688cc, 0x443322, 0.3);
  scene.add(hemi);

  // Event listeners
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
  window.addEventListener('mousemove', e => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  });
  window.addEventListener('mousedown', e => {
    if (!gameRunning || !player || player.dead) return;
    if (e.button === 0) playerShoot(false);
    if (e.button === 2) playerShoot(true);
  });
  window.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'e' && gameRunning && player && !player.dead) playerShoot(true);
  });
  window.addEventListener('contextmenu', e => e.preventDefault());
}

// ─── MAP GENERATION ─────────────────────────────────────────────
function initMap() {
  // Ground
  const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 1, 1);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x2d5a1e,
    roughness: 0.9,
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  ground.name = 'ground';
  scene.add(ground);
  groundPlane = ground;

  // Ground grid/pattern
  const gridGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, MAP_SIZE, MAP_SIZE);
  const gridMat = new THREE.MeshBasicMaterial({ color: 0x3a6b28, wireframe: true, transparent: true, opacity: 0.15 });
  const grid = new THREE.Mesh(gridGeo, gridMat);
  grid.rotation.x = -Math.PI / 2;
  grid.position.y = 0.01;
  scene.add(grid);

  // Arena borders
  const borderMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7 });
  const bH = 2, bT = 0.5;
  [
    { s: [MAP_SIZE + bT, bH, bT], p: [0, bH/2, -MAP_SIZE/2] },
    { s: [MAP_SIZE + bT, bH, bT], p: [0, bH/2, MAP_SIZE/2] },
    { s: [bT, bH, MAP_SIZE + bT], p: [-MAP_SIZE/2, bH/2, 0] },
    { s: [bT, bH, MAP_SIZE + bT], p: [MAP_SIZE/2, bH/2, 0] },
  ].forEach(({ s, p }) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...s), borderMat);
    m.position.set(...p);
    m.castShadow = true;
    m.receiveShadow = true;
    scene.add(m);
    mapWalls.push({ mesh: m, box: new THREE.Box3().setFromObject(m) });
  });

  // Inner walls
  const wallDefs = [
    { p: [-6, 0, -6], s: [4, 2, 0.6] },
    { p: [6, 0, -6], s: [0.6, 2, 4] },
    { p: [6, 0, 6], s: [4, 2, 0.6] },
    { p: [-6, 0, 6], s: [0.6, 2, 4] },
    { p: [0, 0, -10], s: [3, 2, 0.6] },
    { p: [0, 0, 10], s: [3, 2, 0.6] },
    { p: [-12, 0, 0], s: [0.6, 2, 5] },
    { p: [12, 0, 0], s: [0.6, 2, 5] },
    { p: [-3, 0, -3], s: [2, 1.5, 2] },
    { p: [3, 0, 3], s: [2, 1.5, 2] },
    { p: [10, 0, -10], s: [2, 2, 0.6] },
    { p: [-10, 0, 10], s: [2, 2, 0.6] },
  ];
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 });
  wallDefs.forEach(({ p, s }) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...s), wallMat);
    m.position.set(p[0], s[1]/2 + p[1], p[2]);
    m.castShadow = true;
    m.receiveShadow = true;
    scene.add(m);
    mapWalls.push({ mesh: m, box: new THREE.Box3().setFromObject(m) });
  });

  // Bushes (semi-transparent)
  const bushDefs = [
    [-4, 0], [4, 0], [0, -5], [0, 5],
    [-8, -8], [8, 8], [-8, 8], [8, -8],
    [-14, -4], [14, 4], [0, 14], [0, -14],
  ];
  const bushMat = new THREE.MeshStandardMaterial({
    color: 0x1a8a1a,
    transparent: true,
    opacity: 0.55,
    roughness: 0.9
  });
  bushDefs.forEach(([x, z]) => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 6), bushMat);
    m.position.set(x, 0.5, z);
    m.scale.y = 0.6;
    scene.add(m);
    mapBushes.push({ mesh: m, pos: new THREE.Vector3(x, 0, z), radius: 1.2 });
  });

  // Decorative rocks
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.9 });
  for (let i = 0; i < 20; i++) {
    const r = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.2 + Math.random() * 0.3, 0),
      rockMat
    );
    r.position.set(
      (Math.random() - 0.5) * (MAP_SIZE - 4),
      0.15,
      (Math.random() - 0.5) * (MAP_SIZE - 4)
    );
    r.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
    scene.add(r);
  }
}

// ─── PLAYER ─────────────────────────────────────────────────────

// ─── PROJECTILE ─────────────────────────────────────────────────
function createProjectile(origin, direction, owner, isSpecial) {
  const def = owner.def;
  const speed = def.projectileSpeed * (isSpecial ? 0.8 : 1);
  const damage = isSpecial ? def.specialDamage : def.damage;
  const range = isSpecial ? def.specialRange : def.range;
  const size = isSpecial ? 0.25 : 0.15;
  const col = isSpecial ? 0xffd700 : new THREE.Color(def.color).getHex();

  const mat = new THREE.MeshBasicMaterial({
    color: col,
    transparent: true,
    opacity: 0.9,
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 6, 6), mat);
  mesh.position.copy(origin);
  mesh.position.y = 0.6;
  scene.add(mesh);

  // Trail / glow
  const glowMat = new THREE.MeshBasicMaterial({
    color: col,
    transparent: true,
    opacity: 0.3,
  });
  const glow = new THREE.Mesh(new THREE.SphereGeometry(size * 2.5, 6, 6), glowMat);
  mesh.add(glow);

  projectiles.push({
    mesh,
    dir: direction.clone().normalize(),
    speed,
    damage,
    owner,
    isSpecial,
    maxDist: range,
    traveled: 0,
  });
}

function playerShoot(special) {
  if (!player || player.dead) return;
  if (special && player.specialCD > 0) return;
  if (!special && player.attackCD > 0) return;

  // Get aim direction via raycasting onto ground
  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, target);
  if (!target) return;

  const dir = new THREE.Vector3().subVectors(target, player.mesh.position);
  dir.y = 0;
  dir.normalize();

  const spawnPos = player.mesh.position.clone().add(dir.clone().multiplyScalar(0.8));
  createProjectile(spawnPos, dir, player, special);
  AudioSys.play(special ? 'special' : 'shoot');

  if (special) {
    player.specialCD = player.def.specialCooldown;
  } else {
    player.attackCD = player.def.attackCooldown;
  }
}

// ─── COLLISION HELPERS ──────────────────────────────────────────
function checkWallCollision(pos, radius) {
  const testBox = new THREE.Box3().setFromCenterAndSize(
    pos,
    new THREE.Vector3(radius*2, 2, radius*2)
  );
  for (const w of mapWalls) {
    if (testBox.intersectsBox(w.box)) return true;
  }
  return false;
}

function checkBush(pos) {
  for (const b of mapBushes) {
    if (pos.distanceTo(b.pos) < b.radius) return true;
  }
  return false;
}

function clampToMap(pos) {
  const half = MAP_SIZE / 2 - 0.5;
  pos.x = THREE.MathUtils.clamp(pos.x, -half, half);
  pos.z = THREE.MathUtils.clamp(pos.z, -half, half);
}

function getAllEntities() {
  const entities = [];
  if (player && !player.dead) entities.push(player);
  bots.forEach(b => { if (!b.dead) entities.push(b); });
  return entities;
}

// ─── DAMAGE & DEATH ─────────────────────────────────────────────
function dealDamage(target, amount, attacker) {
  if (target.dead) return;
  target.hp -= amount;
  target.lastCombat = 0;
  AudioSys.play('hit');
  showDamageNumber(target.mesh.position, amount);

  if (target.hp <= 0) {
    target.hp = 0;
    kill(target, attacker);
  }
  updateHealthBar(target.hpBar, target.hp, target.maxHp);
}

function kill(entity, killer) {
  entity.dead = true;
  entity.respawnTimer = RESPAWN_TIME;
  entity.mesh.visible = false;
  AudioSys.play('death');

  if (killer) {
    killer.kills++;
    if (killer.isPlayer) {
      playerKills++;
      document.getElementById('hudKills').textContent = `Kills: ${playerKills}`;
    }
  }

  // Drop gems on death in gem grab mode
  if (selectedMode === 'gemgrab' && entity.gems > 0) {
    const dropped = Math.ceil(entity.gems / 2);
    entity.gems -= dropped;
    if (entity.isPlayer) {
      playerGems = entity.gems;
      document.getElementById('hudGems').textContent = `💎 ${playerGems}`;
    }
    // Spawn gems at death pos
    const gemMat = new THREE.MeshStandardMaterial({
      color: 0xaa00ff, emissive: 0x6600aa, emissiveIntensity: 0.6, roughness: 0.2, metalness: 0.5
    });
    for (let i = 0; i < dropped; i++) {
      const g = new THREE.Mesh(new THREE.OctahedronGeometry(0.35, 0), gemMat);
      g.position.copy(entity.mesh.position);
      g.position.x += (Math.random()-0.5) * 3;
      g.position.z += (Math.random()-0.5) * 3;
      g.position.y = 0.5;
      g.castShadow = true;
      scene.add(g);
      gems.push({ mesh: g, collected: false, respawnTimer: 0 });
    }
  }

  addKillFeed(killer, entity);

  if (entity.isPlayer) {
    document.getElementById('respawnOverlay').style.display = 'flex';
  }
}

function respawn(entity) {
  entity.dead = false;
  entity.hp = entity.maxHp;
  entity.mesh.visible = true;
  const angle = Math.random() * Math.PI * 2;
  const dist = 10 + Math.random() * 5;
  entity.mesh.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
  updateHealthBar(entity.hpBar, entity.hp, entity.maxHp);

  if (entity.isPlayer) {
    document.getElementById('respawnOverlay').style.display = 'none';
  }
}

// ─── UI HELPERS ─────────────────────────────────────────────────
function showDamageNumber(worldPos, amount) {
  const v = worldPos.clone();
  v.y += 2;
  v.project(camera);
  const x = (v.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-v.y * 0.5 + 0.5) * window.innerHeight;

  const el = document.createElement('div');
  el.className = 'dmg-number';
  el.textContent = `-${amount}`;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function addKillFeed(killer, victim) {
  const feed = document.getElementById('killFeed');
  const msg = document.createElement('div');
  msg.className = 'kill-msg';
  const kName = killer ? (killer.isPlayer ? 'Ty' : killer.name || 'Bot') : '?';
  const vName = victim.isPlayer ? 'Ty' : victim.name || 'Bot';
  msg.innerHTML = `<span style="color:${killer?.isPlayer ? '#2ecc71' : '#e74c3c'}">${kName}</span> ► <span style="color:${victim.isPlayer ? '#2ecc71' : '#ff6b6b'}">${vName}</span>`;
  feed.appendChild(msg);
  setTimeout(() => msg.remove(), 3500);
}

// ─── BOT AI ─────────────────────────────────────────────────────
function updateBot(bot, dt) {
  if (bot.dead) {
    bot.respawnTimer -= dt;
    if (bot.respawnTimer <= 0) respawn(bot);
    return;
  }

  bot.attackCD = Math.max(0, bot.attackCD - dt);
  bot.specialCD = Math.max(0, bot.specialCD - dt);
  bot.lastCombat += dt;

  // Regen
  if (bot.lastCombat > 3 && bot.hp < bot.maxHp) {
    bot.hp = Math.min(bot.maxHp, bot.hp + bot.maxHp * 0.05 * dt);
    updateHealthBar(bot.hpBar, bot.hp, bot.maxHp);
  }

  // Bush check
  bot.inBush = checkBush(bot.mesh.position);
  bot.mesh.traverse(child => {
    if (child.isMesh) {
      child.material.opacity = bot.inBush ? 0.4 : 1;
      child.material.transparent = bot.inBush;
    }
  });

  // Find nearest enemy (player or other bots – simplified: target player)
  let target = null;
  let targetDist = Infinity;

  if (player && !player.dead) {
    const d = bot.mesh.position.distanceTo(player.mesh.position);
    // Can't see player in bush unless close
    if (!player.inBush || d < 4) {
      if (d < targetDist) { target = player; targetDist = d; }
    }
  }

  // Also check other bots (for variety)
  bots.forEach(other => {
    if (other === bot || other.dead) return;
    const d = bot.mesh.position.distanceTo(other.mesh.position);
    if (!other.inBush || d < 4) {
      if (d < targetDist * 0.7) { target = other; targetDist = d; }
    }
  });

  // Gem grab: also move towards gems
  let gemTarget = null;
  if (selectedMode === 'gemgrab') {
    let closestGem = Infinity;
    gems.forEach(g => {
      if (g.collected) return;
      const d = bot.mesh.position.distanceTo(g.mesh.position);
      if (d < closestGem) { closestGem = d; gemTarget = g; }
    });
  }

  const speed = bot.def.speed;
  const attackRange = bot.def.range * 0.8;

  if (target && targetDist < attackRange + 5) {
    // Move towards target
    const dir = new THREE.Vector3().subVectors(target.mesh.position, bot.mesh.position);
    dir.y = 0; dir.normalize();

    if (targetDist > attackRange * 0.6) {
      const newPos = bot.mesh.position.clone().add(dir.clone().multiplyScalar(speed * dt));
      if (!checkWallCollision(newPos, 0.5)) {
        bot.mesh.position.copy(newPos);
      } else {
        // Try to navigate around
        const perp = new THREE.Vector3(-dir.z, 0, dir.x);
        const altPos = bot.mesh.position.clone().add(perp.multiplyScalar(speed * dt));
        if (!checkWallCollision(altPos, 0.5)) bot.mesh.position.copy(altPos);
      }
    }

    // Face target
    bot.mesh.lookAt(new THREE.Vector3(target.mesh.position.x, 0, target.mesh.position.z));

    // Attack
    if (targetDist < attackRange && bot.attackCD <= 0) {
      const shootDir = dir.clone();
      const spawnPos = bot.mesh.position.clone().add(shootDir.clone().multiplyScalar(0.8));
      createProjectile(spawnPos, shootDir, bot, false);
      bot.attackCD = bot.def.attackCooldown;
    }
    // Special
    if (targetDist < attackRange * 0.5 && bot.specialCD <= 0 && Math.random() < 0.3) {
      const shootDir = dir.clone();
      const spawnPos = bot.mesh.position.clone().add(shootDir.clone().multiplyScalar(0.8));
      createProjectile(spawnPos, shootDir, bot, true);
      bot.specialCD = bot.def.specialCooldown;
    }
  } else if (gemTarget && selectedMode === 'gemgrab') {
    const dir = new THREE.Vector3().subVectors(gemTarget.mesh.position, bot.mesh.position);
    dir.y = 0; dir.normalize();
    const newPos = bot.mesh.position.clone().add(dir.clone().multiplyScalar(speed * dt));
    if (!checkWallCollision(newPos, 0.5)) bot.mesh.position.copy(newPos);
    bot.mesh.lookAt(new THREE.Vector3(gemTarget.mesh.position.x, 0, gemTarget.mesh.position.z));
  } else {
    // Wander
    bot.wanderTimer -= dt;
    if (bot.wanderTimer <= 0) {
      bot.wanderDir = new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize();
      bot.wanderTimer = 2 + Math.random() * 3;
    }
    const newPos = bot.mesh.position.clone().add(bot.wanderDir.clone().multiplyScalar(speed * 0.5 * dt));
    if (!checkWallCollision(newPos, 0.5)) {
      bot.mesh.position.copy(newPos);
    } else {
      bot.wanderDir.negate();
    }
    bot.mesh.lookAt(bot.mesh.position.clone().add(bot.wanderDir));
  }

  clampToMap(bot.mesh.position);
}

// ─── MINIMAP ────────────────────────────────────────────────────
function initMinimap() {
  minimapCtx = document.getElementById('minimapCanvas').getContext('2d');
}

function drawMinimap() {
  if (!minimapCtx) return;
  const ctx = minimapCtx;
  const W = 140, H = 140;
  const scale = W / MAP_SIZE;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a2e1a';
  ctx.fillRect(0, 0, W, H);

  // Walls
  ctx.fillStyle = '#5a4a30';
  mapWalls.forEach(w => {
    const p = w.mesh.position;
    const s = w.mesh.geometry.parameters;
    if (!s) return;
    ctx.fillRect(
      (p.x + MAP_SIZE/2) * scale - (s.width||1)*scale/2,
      (p.z + MAP_SIZE/2) * scale - (s.depth||1)*scale/2,
      (s.width||1) * scale,
      (s.depth||1) * scale
    );
  });

  // Bushes
  ctx.fillStyle = 'rgba(30,140,30,0.5)';
  mapBushes.forEach(b => {
    ctx.beginPath();
    ctx.arc((b.pos.x + MAP_SIZE/2)*scale, (b.pos.z + MAP_SIZE/2)*scale, b.radius*scale, 0, Math.PI*2);
    ctx.fill();
  });

  // Gems
  if (selectedMode === 'gemgrab') {
    ctx.fillStyle = '#aa00ff';
    gems.forEach(g => {
      if (g.collected) return;
      ctx.beginPath();
      ctx.arc((g.mesh.position.x + MAP_SIZE/2)*scale, (g.mesh.position.z + MAP_SIZE/2)*scale, 2.5, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Bots
  bots.forEach(b => {
    if (b.dead) return;
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc((b.mesh.position.x + MAP_SIZE/2)*scale, (b.mesh.position.z + MAP_SIZE/2)*scale, 3, 0, Math.PI*2);
    ctx.fill();
  });

  // Player
  if (player && !player.dead) {
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.arc((player.mesh.position.x + MAP_SIZE/2)*scale, (player.mesh.position.z + MAP_SIZE/2)*scale, 4, 0, Math.PI*2);
    ctx.fill();
  }
}

// ─── MAIN UPDATE ────────────────────────────────────────────────
function update(dt) {
  if (!gameRunning || !player) return;

  // Timer
  gameTime -= dt;
  if (gameTime <= 0) {
    endGame();
    return;
  }
  const mins = Math.floor(gameTime / 60);
  const secs = Math.floor(gameTime % 60);
  document.getElementById('hudTimer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

  // Win conditions
  if (selectedMode === 'deathmatch' && playerKills >= 15) { endGame(); return; }
  if (selectedMode === 'gemgrab' && playerGems >= 10) { endGame(); return; }

  // ── Player update ──
  if (player.dead) {
    player.respawnTimer -= dt;
    document.getElementById('respawnTimer').textContent = Math.ceil(player.respawnTimer);
    if (player.respawnTimer <= 0) respawn(player);
  } else {
    // Movement
    player.attackCD = Math.max(0, player.attackCD - dt);
    player.specialCD = Math.max(0, player.specialCD - dt);
    player.lastCombat += dt;

    const moveDir = new THREE.Vector3();
    if (keys['w'] || keys['arrowup']) moveDir.z -= 1;
    if (keys['s'] || keys['arrowdown']) moveDir.z += 1;
    if (keys['a'] || keys['arrowleft']) moveDir.x -= 1;
    if (keys['d'] || keys['arrowright']) moveDir.x += 1;

    if (moveDir.length() > 0) {
      moveDir.normalize();
      const speed = player.def.speed;
      const newPos = player.mesh.position.clone().add(moveDir.multiplyScalar(speed * dt));
      if (!checkWallCollision(newPos, 0.4)) {
        player.mesh.position.copy(newPos);
      } else {
        // Try axes independently
        const posX = player.mesh.position.clone();
        posX.x = newPos.x;
        if (!checkWallCollision(posX, 0.4)) player.mesh.position.x = newPos.x;
        const posZ = player.mesh.position.clone();
        posZ.z = newPos.z;
        if (!checkWallCollision(posZ, 0.4)) player.mesh.position.z = newPos.z;
      }
    }
    clampToMap(player.mesh.position);

    // Face mouse
    raycaster.setFromCamera(mouse, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const target = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(plane, target)) {
      player.mesh.lookAt(new THREE.Vector3(target.x, 0, target.z));
    }

    // Health regen
    if (player.lastCombat > 3 && player.hp < player.maxHp) {
      player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.06 * dt);
      updateHealthBar(player.hpBar, player.hp, player.maxHp);
    }

    // Bush check
    player.inBush = checkBush(player.mesh.position);
    player.mesh.traverse(child => {
      if (child.isMesh && !child.isSprite) {
        child.material.opacity = player.inBush ? 0.5 : 1;
        child.material.transparent = player.inBush;
      }
    });

    // Update HUD
    const hpPct = (player.hp / player.maxHp) * 100;
    document.getElementById('hpBar').style.width = hpPct + '%';
    document.getElementById('hpText').textContent = `${Math.ceil(player.hp)}/${player.maxHp}`;

    // Cooldowns
    const atkPct = player.attackCD > 0 ? (player.attackCD / player.def.attackCooldown) : 0;
    document.getElementById('cdAttackOverlay').style.height = (atkPct * 100) + '%';
    const specPct = player.specialCD > 0 ? (player.specialCD / player.def.specialCooldown) : 0;
    document.getElementById('cdSpecialOverlay').style.height = (specPct * 100) + '%';

    // Collect gems
    if (selectedMode === 'gemgrab') {
      gems.forEach(g => {
        if (g.collected) return;
        if (player.mesh.position.distanceTo(g.mesh.position) < 1.2) {
          g.collected = true;
          g.mesh.visible = false;
          player.gems++;
          playerGems = player.gems;
          document.getElementById('hudGems').textContent = `💎 ${playerGems}`;
          AudioSys.play('gem');
        }
      });
    }
  }

  // ── Bot updates ──
  bots.forEach(b => updateBot(b, dt));

  // ── Bot gem collection ──
  if (selectedMode === 'gemgrab') {
    bots.forEach(b => {
      if (b.dead) return;
      gems.forEach(g => {
        if (g.collected) return;
        if (b.mesh.position.distanceTo(g.mesh.position) < 1.2) {
          g.collected = true;
          g.mesh.visible = false;
          b.gems++;
          AudioSys.play('gem');
        }
      });
    });

    // Respawn collected gems
    let activeGems = gems.filter(g => !g.collected).length;
    if (activeGems < 3) spawnGems(3);
  }

  // ── Projectiles ──
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    const move = p.dir.clone().multiplyScalar(p.speed * dt);
    p.mesh.position.add(move);
    p.traveled += move.length();

    // Wall collision
    if (checkWallCollision(p.mesh.position, 0.1) || p.traveled > p.maxDist) {
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
      continue;
    }

    // Entity collision
    const entities = getAllEntities();
    let hit = false;
    for (const e of entities) {
      if (e === p.owner) continue;
      const dist = p.mesh.position.distanceTo(e.mesh.position);
      const hitRadius = e.def.bodyScale * 0.6;
      if (dist < hitRadius + 0.2) {
        dealDamage(e, p.damage, p.owner);
        scene.remove(p.mesh);
        projectiles.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;

    // Out of map
    if (Math.abs(p.mesh.position.x) > MAP_SIZE/2 || Math.abs(p.mesh.position.z) > MAP_SIZE/2) {
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
    }
  }

  // ── Camera follow ──
  if (player) {
    const targetPos = player.mesh.position.clone().add(new THREE.Vector3(0, 18, 14));
    camera.position.lerp(targetPos, 4 * dt);
    camera.lookAt(player.mesh.position.clone().add(new THREE.Vector3(0, 0, -2)));
  }

  // ── Gem rotation ──
  gems.forEach(g => {
    if (!g.collected) {
      g.mesh.rotation.y += dt * 2;
      g.mesh.position.y = 0.5 + Math.sin(Date.now() * 0.003) * 0.15;
    }
  });

  // ── Score display ──
  if (selectedMode === 'deathmatch') {
    document.getElementById('hudScore').textContent = `${playerKills}/15 kills`;
  } else {
    const maxBotGems = Math.max(...bots.map(b => b.gems), 0);
    document.getElementById('hudScore').textContent = `Ty: 💎${playerGems} | Boti: 💎${maxBotGems}`;
  }

  drawMinimap();
}

// ─── END GAME ───────────────────────────────────────────────────
function endGame() {
  gameRunning = false;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('respawnOverlay').style.display = 'none';
  const endScreen = document.getElementById('endScreen');
  endScreen.style.display = 'flex';

  let won = false;
  if (selectedMode === 'deathmatch') {
    const maxBotKills = Math.max(...bots.map(b => b.kills), 0);
    won = playerKills >= maxBotKills;
    document.getElementById('endStats').innerHTML =
      `Tvé kills: <b>${playerKills}</b><br>Nejlepší bot: <b>${maxBotKills}</b> kills<br>Čas: ${120 - Math.floor(gameTime)}s`;
  } else {
    const maxBotGems = Math.max(...bots.map(b => b.gems), 0);
    won = playerGems >= maxBotGems;
    document.getElementById('endStats').innerHTML =
      `Tvé gemy: <b>💎${playerGems}</b><br>Nejlepší bot: <b>💎${maxBotGems}</b><br>Čas: ${120 - Math.floor(gameTime)}s`;
  }

  const title = document.getElementById('endTitle');
  title.textContent = won ? 'VÍTĚZSTVÍ!' : 'PROHRA';
  title.style.color = won ? '#2ecc71' : '#e74c3c';
}

// ─── ANIMATION LOOP ─────────────────────────────────────────────
function animate() {
  if (!gameRunning) return;
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05); // cap delta
  update(dt);
  renderer.render(scene, camera);
}

// Initialize with menu visible
</script>
