<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Mini FPS (Three.js)</title>
<style>
    body { margin:0; overflow:hidden; font-family:Arial; background:#000; }
    canvas { display:block; }

    #menu, #gameOver {
        position:absolute; top:0; left:0; width:100%; height:100%;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        background:rgba(0,0,0,0.8); color:white;
    }

    button {
        padding:15px 30px; font-size:20px; cursor:pointer;
    }

    #hud {
        position:absolute; top:10px; left:10px; color:white;
        font-size:18px;
    }

    #crosshair {
        position:absolute; top:50%; left:50%;
        width:20px; height:20px; margin-left:-10px; margin-top:-10px;
    }
    #crosshair::before, #crosshair::after {
        content:""; position:absolute; background:white;
    }
    #crosshair::before {
        left:9px; top:0; width:2px; height:20px;
    }
    #crosshair::after {
        top:9px; left:0; height:2px; width:20px;
    }
</style>
</head>
<body>

<div id="menu">
    <h1>Mini FPS</h1>
    <button id="startBtn">START</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>GAME OVER</h1>
    <button onclick="location.reload()">RESTART</button>
</div>

<div id="hud"></div>
<div id="crosshair"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';

/* =====================
   ZÁKLADNÍ SETUP
===================== */
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xaaaaaa, 10, 80);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

let clock = new THREE.Clock();

/* =====================
   SVĚTLO
===================== */
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
light.castShadow = true;
scene.add(light);

/* =====================
   PODLAHA (šachovnice)
===================== */
function createFloor(){
    let size = 512;
    let canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    let ctx = canvas.getContext('2d');

    for(let y=0;y<8;y++){
        for(let x=0;x<8;x++){
            ctx.fillStyle = (x+y)%2==0 ? '#888' : '#555';
            ctx.fillRect(x*64,y*64,64,64);
        }
    }

    let tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(20,20);

    let mat = new THREE.MeshStandardMaterial({map:tex});
    let geo = new THREE.PlaneGeometry(200,200);
    let floor = new THREE.Mesh(geo, mat);
    floor.rotation.x = -Math.PI/2;
    floor.receiveShadow = true;
    scene.add(floor);
}
createFloor();

/* =====================
   ZDI A PŘEKÁŽKY
===================== */
let colliders = [];

function addBox(x,z,w,h,d){
    let mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w,h,d),
        new THREE.MeshStandardMaterial({color:0x777777})
    );
    mesh.position.set(x,h/2,z);
    mesh.castShadow = true;
    scene.add(mesh);

    colliders.push(new THREE.Box3().setFromObject(mesh));
}

for(let i=0;i<20;i++){
    addBox(Math.random()*80-40, Math.random()*80-40, 4,4,4);
}

/* =====================
   PLAYER
===================== */
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
let onGround = false;

let keys = {};
document.addEventListener('keydown', e=>keys[e.code]=true);
document.addEventListener('keyup', e=>keys[e.code]=false);

let yaw = 0, pitch = 0;

/* Pointer Lock */
document.getElementById('startBtn').onclick = ()=>{
    document.body.requestPointerLock();
    document.getElementById('menu').style.display="none";
    audioCtx = new AudioContext();
};

document.addEventListener('mousemove', e=>{
    if(document.pointerLockElement){
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    }
});

/* =====================
   ZBRAŇ
===================== */
let gun = new THREE.Group();
let barrel = new THREE.Mesh(
    new THREE.BoxGeometry(0.2,0.2,1),
    new THREE.MeshStandardMaterial({color:0x222222})
);
barrel.position.z = -0.5;
gun.add(barrel);
gun.position.set(0.5,-0.5,-1);
camera.add(gun);
scene.add(camera);

let ammo = 30;
let reloading = false;
let recoil = 0;

/* =====================
   MUZZLE FLASH
===================== */
let flash = new THREE.PointLight(0xffaa55, 0, 5);
camera.add(flash);

/* =====================
   AUDIO (procedurální)
===================== */
let audioCtx;

function playShoot(){
    let o = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    o.frequency.value = 200;
    g.gain.value = 0.1;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime+0.05);
}

function playEmpty(){
    let o = audioCtx.createOscillator();
    o.frequency.value = 100;
    o.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime+0.05);
}

/* =====================
   NEPŘÁTELÉ
===================== */
let enemies = [];
let wave = 1;
let kills = 0;

function spawnWave(){
    for(let i=0;i<wave+2;i++){
        let enemy = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.5,1),
            new THREE.MeshStandardMaterial({color:0xff0000})
        );
        enemy.position.set(Math.random()*60-30,1,Math.random()*60-30);
        enemy.userData.hp = 3;
        scene.add(enemy);
        enemies.push(enemy);
    }
}
spawnWave();

/* =====================
   STŘELBA
===================== */
let raycaster = new THREE.Raycaster();

document.addEventListener('mousedown', ()=>{
    if(!document.pointerLockElement) return;

    if(ammo<=0){
        playEmpty();
        return;
    }

    ammo--;
    recoil = 0.2;
    flash.intensity = 2;
    playShoot();

    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    let hits = raycaster.intersectObjects(enemies);

    if(hits.length){
        let e = hits[0].object;
        e.userData.hp--;
        if(e.userData.hp<=0){
            scene.remove(e);
            enemies.splice(enemies.indexOf(e),1);
            kills++;
        }
    }
});

/* reload */
document.addEventListener('keydown', e=>{
    if(e.code==="KeyR" && !reloading){
        reloading = true;
        setTimeout(()=>{
            ammo=30;
            reloading=false;
        },2000);
    }
});

/* =====================
   GAME LOOP
===================== */
let hp = 100;

function animate(){
    requestAnimationFrame(animate);
    let dt = clock.getDelta();

    /* Kamera */
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    /* Pohyb */
    direction.set(0,0,0);
    if(keys['KeyW']) direction.z -=1;
    if(keys['KeyS']) direction.z +=1;
    if(keys['KeyA']) direction.x -=1;
    if(keys['KeyD']) direction.x +=1;
    direction.normalize();

    let speed = 10;
    let forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    let right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

    velocity.x = (forward.x*direction.z + right.x*direction.x)*speed;
    velocity.z = (forward.z*direction.z + right.z*direction.x)*speed;

    velocity.y -= 20*dt;

    if(onGround && keys['Space']){
        velocity.y = 8;
        onGround = false;
    }

    camera.position.addScaledVector(velocity, dt);

    /* Zem */
    if(camera.position.y < 1.8){
        camera.position.y = 1.8;
        velocity.y = 0;
        onGround = true;
    }

    /* Head bobbing */
    if(direction.length()>0 && onGround){
        camera.position.y += Math.sin(performance.now()*0.01)*0.05;
    }

    /* recoil */
    gun.position.z = -1 - recoil;
    recoil *= 0.9;

    flash.intensity *= 0.5;

    /* AI */
    enemies.forEach(e=>{
        let dir = camera.position.clone().sub(e.position).normalize();
        e.position.addScaledVector(dir, dt*(2+wave*0.5));
        e.lookAt(camera.position);

        if(e.position.distanceTo(camera.position)<1.5){
            hp -= 20*dt;
        }
    });

    /* další vlna */
    if(enemies.length===0){
        wave++;
        spawnWave();
    }

    /* HUD */
    document.getElementById('hud').innerHTML =
        `HP: ${hp.toFixed(0)}<br>Ammo: ${ammo}${reloading?" (Reloading)":""}<br>Kills: ${kills}<br>Wave: ${wave}`;

    /* Game Over */
    if(hp<=0){
        document.exitPointerLock();
        document.getElementById('gameOver').style.display="flex";
        return;
    }

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
