<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Dreidel Spinner</title>
<style>
    body { margin: 0; background-color: #f9f5e3; overflow: hidden; }
    #info { position: absolute; top: 20px; width: 100%; text-align: center; font-family: Arial; font-size: 24px; color: #4b2e83; }
    button { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); padding: 10px 20px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background-color: #4b2e83; color: white; }
    button:hover { background-color: #6b44b0; }
</style>
</head>
<body>
<div id="info">Click "Spin" to spin the dreidel!</div>
<button onclick="spinDreidel()">Spin</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
let scene, camera, renderer, dreidel;

init();
animate();

function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Light
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,5,5);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0x404040);
    scene.add(ambient);

    // Dreidel geometry (simplified as a spinning cone)
    const geometry = new THREE.CylinderGeometry(0.2, 0.5, 1, 4);
    const material = new THREE.MeshStandardMaterial({color: 0x4b2e83});
    dreidel = new THREE.Mesh(geometry, material);
    scene.add(dreidel);

    // Add Hebrew letters (simplified as colored sides)
    const sides = ['נ','ג','ה','ש']; // Nun, Gimel, Hei, Shin
    for(let i=0;i<4;i++){
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,128,128);
        ctx.fillStyle = '#4b2e83'; ctx.font = '80px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(sides[i], 64,64);
        const tex = new THREE.CanvasTexture(canvas);
        geometry.groups[i] = {start: i*3, count: 3, materialIndex: i};
        geometry.faces.forEach((face, idx) => face.materialIndex = idx % 4);
        dreidel.material = Array(4).fill().map((_, idx) => new THREE.MeshStandardMaterial({map: new THREE.CanvasTexture(canvas)}));
    }

    window.addEventListener('resize', onWindowResize, false);
}

function onWindowResize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

let spinning = false;
function spinDreidel(){
    if(spinning) return;
    spinning = true;
    let spinTime = 100 + Math.random()*200; // frames
    let speed = 0.3 + Math.random()*0.5;
    let frame = 0;

    function spinFrame(){
        if(frame < spinTime){
            dreidel.rotation.y += speed;
            speed *= 0.98; // slow down
            frame++;
            requestAnimationFrame(spinFrame);
        } else {
            spinning = false;
            const side = Math.floor((dreidel.rotation.y % (2*Math.PI)) / (Math.PI/2));
            const letters = ['נ','ג','ה','ש'];
            document.getElementById('info').innerText = `Dreidel landed on: ${letters[side]}`;
        }
    }
    spinFrame();
}

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
</script>
</body>
</html>
