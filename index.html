<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS:GO - Ultimate Browser Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid #00ff00;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #00ff00;
            font-size: 24px; pointer-events: none;
        }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; cursor: pointer;
        }
        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="flash"></div>
    <div id="ui">HP: 100 | KILLS: <span id="killCount">0</span></div>
    
    <div id="instructions">
        <h1 style="color: #de9b35;">JS:GO PRO</h1>
        <p>KLIKNI PRO VSTUP DO ZÁPASU</p>
        <ul style="text-align: left;">
            <li>WASD - Pohyb</li>
            <li>MYŠ - Míření a Střelba</li>
            <li>MEZERNÍK - Skok</li>
        </ul>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- KONFIGURACE ---
        let kills = 0;
        let hp = 100;
        const enemies = [];
        const clock = new THREE.Clock();

        // --- SCÉNA A RENDERER ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x222222, 1, 50);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- OSVĚTLENÍ ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- MAPA (Floor & Walls) ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Přidání náhodných beden (jako na De_Dust2)
        const boxGeo = new THREE.BoxGeometry(2, 2, 2);
        for(let i = 0; i < 30; i++) {
            const box = new THREE.Mesh(boxGeo, new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
            box.position.set(Math.random() * 80 - 40, 1, Math.random() * 80 - 40);
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);
        }

        // --- ZBRAŇ (Model) ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.5), new THREE.MeshPhongMaterial({color: 0x111111}));
        gunGroup.add(gunBody);
        camera.add(gunGroup);
        gunGroup.position.set(0.3, -0.2, -0.5);
        scene.add(camera);

        // --- LOGIKA NEPRÁTEL ---
        function spawnEnemy() {
            const enemyGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
            const enemyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const enemy = new THREE.Mesh(enemyGeo, enemyMat);
            enemy.position.set(Math.random() * 60 - 30, 1, Math.random() * 60 - 30);
            enemy.userData = { health: 100 };
            scene.add(enemy);
            enemies.push(enemy);
        }
        for(let i=0; i<10; i++) spawnEnemy();

        // --- OVLÁDÁNÍ ---
        let moveFwd = false, moveBwd = false, moveL = false, moveR = false, canJump = true;
        let vY = 0;

        document.addEventListener('mousedown', () => {
            if (document.pointerLockElement !== document.body) {
                document.body.requestPointerLock();
            } else {
                shoot();
            }
        });

        function shoot() {
            // Flash efekt
            document.getElementById('flash').style.opacity = '0.3';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 50);

            // Zpětný ráz (visual)
            gunGroup.position.z += 0.05;
            setTimeout(() => gunGroup.position.z -= 0.05, 50);

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera({x: 0, y: 0}, camera);
            const hits = raycaster.intersectObjects(enemies);

            if (hits.length > 0) {
                const target = hits[0].object;
                target.material.color.setHex(0xffffff);
                setTimeout(() => {
                    scene.remove(target);
                    enemies.splice(enemies.indexOf(target), 1);
                    kills++;
                    document.getElementById('killCount').innerText = kills;
                    spawnEnemy(); // Respawn
                }, 100);
            }
        }

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveFwd = true;
            if(e.code === 'KeyS') moveBwd = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
            if(e.code === 'Space' && canJump) { vY = 0.15; canJump = false; }
        });

        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveFwd = false;
            if(e.code === 'KeyS') moveBwd = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, camera.rotation.x));
            }
        });

        const instructions = document.getElementById('instructions');
        document.addEventListener('pointerlockchange', () => {
            instructions.style.display = document.pointerLockElement ? 'none' : 'flex';
        });

        // --- HLAVNÍ SMYČKA ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (document.pointerLockElement === document.body) {
                const speed = 0.12;
                if (moveFwd) camera.translateZ(-speed);
                if (moveBwd) camera.translateZ(speed);
                if (moveL) camera.translateX(-speed);
                if (moveR) camera.translateX(speed);

                // Gravitace a skok
                vY -= 0.005; 
                camera.position.y += vY;
                if (camera.position.y < 1.6) {
                    camera.position.y = 1.6;
                    vY = 0;
                    canJump = true;
                }

                // AI Nepřátel (pohyb k hráči)
                enemies.forEach(en => {
                    en.lookAt(camera.position.x, 1, camera.position.z);
                    en.translateZ(0.02);
                });
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
