<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FPS Arena</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#000; }
canvas { display:block; }

/* MENU */
#menu, #gameOver {
    position:absolute; width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.85); color:white;
    z-index:10;
}
button {
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
}

/* HUD */
#hud {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:18px;
}

/* CROSSHAIR */
#crosshair {
    position:absolute;
    top:50%; left:50%;
    width:20px; height:20px;
    margin-left:-10px; margin-top:-10px;
}
#crosshair::before, #crosshair::after {
    content:""; position:absolute; background:white;
}
#crosshair::before { left:9px; width:2px; height:20px; }
#crosshair::after { top:9px; height:2px; width:20px; }

/* OVERLAY IMAGE */
#overlayImg {
    position:absolute;
    bottom:20px;
    right:20px;
    width:220px;
    pointer-events:none;
    opacity:0.9;
}
</style>
</head>

<body>

<div id="menu">
    <h1>FPS Arena</h1>
    <button id="startBtn">START</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>GAME OVER</h1>
    <button onclick="location.reload()">RESTART</button>
</div>

<div id="hud"></div>
<div id="crosshair"></div>

<img id="overlayImg" src="overlay.png">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ================= SETUP ================= */
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xaaaaaa, 20, 120);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

let clock = new THREE.Clock();

/* ================= LIGHT ================= */
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,40,20);
light.castShadow=true;
scene.add(light);

/* ================= FLOOR ================= */
let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(300,300),
    new THREE.MeshStandardMaterial({color:0x777777})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow=true;
scene.add(floor);

/* ================= MAP ================= */
let colliders = [];

function addBox(x,z,w=4,h=4,d=4){
    let m = new THREE.Mesh(
        new THREE.BoxGeometry(w,h,d),
        new THREE.MeshStandardMaterial({color:0x555555})
    );
    m.position.set(x,h/2,z);
    m.castShadow=true;
    scene.add(m);

    colliders.push(new THREE.Box3().setFromObject(m));
}

for(let i=0;i<25;i++){
    addBox(Math.random()*100-50, Math.random()*100-50);
}

/* ================= PLAYER ================= */
let velocity = new THREE.Vector3();
let keys = {};
let yaw=0, pitch=0;
let onGround=false;

document.addEventListener('keydown', e=>keys[e.code]=true);
document.addEventListener('keyup', e=>keys[e.code]=false);

document.getElementById('startBtn').onclick = ()=>{
    document.body.requestPointerLock();
    document.getElementById('menu').style.display="none";
    audioCtx = new AudioContext();
};

document.addEventListener('mousemove', e=>{
    if(document.pointerLockElement){
        yaw -= e.movementX*0.002;
        pitch -= e.movementY*0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2,pitch));
    }
});

/* ================= GUN ================= */
let gun = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.3,1),
    new THREE.MeshStandardMaterial({color:0x222222})
);
gun.position.set(0.6,-0.6,-1);
camera.add(gun);
scene.add(camera);

let ammo=30, reloading=false;
let recoil=0;

/* FLASH */
let flash = new THREE.PointLight(0xffaa55,0,5);
camera.add(flash);

/* ================= AUDIO ================= */
let audioCtx;

function shootSound(){
    let o=audioCtx.createOscillator();
    let g=audioCtx.createGain();
    o.frequency.value=200;
    g.gain.value=0.1;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+0.05);
}

/* ================= ENEMIES ================= */
let enemies=[];
let wave=1, kills=0;

function spawnWave(){
    for(let i=0;i<wave+2;i++){
        let e = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.5,1),
            new THREE.MeshStandardMaterial({color:0xff0000})
        );
        e.position.set(Math.random()*80-40,1,Math.random()*80-40);
        e.userData.hp=3;
        scene.add(e);
        enemies.push(e);
    }
}
spawnWave();

/* ================= SHOOT ================= */
let raycaster = new THREE.Raycaster();

document.addEventListener('mousedown', ()=>{
    if(!document.pointerLockElement) return;

    if(ammo<=0 || reloading) return;

    ammo--;
    recoil=0.2;
    flash.intensity=2;
    shootSound();

    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    let hit = raycaster.intersectObjects(enemies);

    if(hit.length){
        let e = hit[0].object;
        e.userData.hp--;
        if(e.userData.hp<=0){
            scene.remove(e);
            enemies.splice(enemies.indexOf(e),1);
            kills++;
        }
    }
});

/* reload */
document.addEventListener('keydown', e=>{
    if(e.code==="KeyR" && !reloading){
        reloading=true;
        setTimeout(()=>{
            ammo=30;
            reloading=false;
        },2000);
    }
});

/* ================= LOOP ================= */
let hp=100;

function animate(){
    requestAnimationFrame(animate);
    let dt = clock.getDelta();

    camera.rotation.order="YXZ";
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;

    let dir = new THREE.Vector3();

    /* ✅ FIXED CONTROLS */
    if(keys['KeyW']) dir.z -=1; // dopředu
    if(keys['KeyS']) dir.z +=1; // dozadu
    if(keys['KeyA']) dir.x -=1;
    if(keys['KeyD']) dir.x +=1;

    dir.normalize();

    let forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    let right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

    velocity.x = (forward.x*dir.z + right.x*dir.x)*10;
    velocity.z = (forward.z*dir.z + right.z*dir.x)*10;

    velocity.y -= 20*dt;

    if(onGround && keys['Space']){
        velocity.y=8;
        onGround=false;
    }

    camera.position.addScaledVector(velocity,dt);

    if(camera.position.y<1.8){
        camera.position.y=1.8;
        velocity.y=0;
        onGround=true;
    }

    /* HEAD BOB */
    if(dir.length()>0 && onGround){
        camera.position.y += Math.sin(performance.now()*0.01)*0.05;
    }

    /* recoil */
    gun.position.z = -1 - recoil;
    recoil *= 0.9;
    flash.intensity *= 0.5;

    /* AI */
    enemies.forEach(e=>{
        let d = camera.position.clone().sub(e.position).normalize();
        e.position.addScaledVector(d, dt*(2+wave*0.3));
        e.lookAt(camera.position);

        if(e.position.distanceTo(camera.position)<1.5){
            hp -= 20*dt;
        }
    });

    if(enemies.length===0){
        wave++;
        spawnWave();
    }

    /* HUD */
    document.getElementById('hud').innerHTML =
        `HP: ${hp.toFixed(0)}<br>Ammo: ${ammo}${reloading?" (Reload)":""}<br>Kills: ${kills}<br>Wave: ${wave}`;

    if(hp<=0){
        document.exitPointerLock();
        document.getElementById('gameOver').style.display="flex";
        return;
    }

    renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
