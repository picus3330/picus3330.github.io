<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Mini FPS</title>
<style>
    body { margin:0; overflow:hidden; font-family:Arial; background:#000; }
    canvas { display:block; }

    #menu, #gameOver {
        position:absolute; top:0; left:0; width:100%; height:100%;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        background:rgba(0,0,0,0.8); color:white;
    }

    button {
        padding:15px 30px; font-size:20px; cursor:pointer;
    }

    #hud {
        position:absolute; top:10px; left:10px; color:white;
        font-size:18px;
    }

    #crosshair {
        position:absolute; top:50%; left:50%;
        width:20px; height:20px; margin-left:-10px; margin-top:-10px;
    }
    #crosshair::before, #crosshair::after {
        content:""; position:absolute; background:white;
    }
    #crosshair::before {
        left:9px; top:0; width:2px; height:20px;
    }
    #crosshair::after {
        top:9px; left:0; height:2px; width:20px;
    }

    /* 🔥 TVŮJ OBRÁZEK */
    #overlayImg {
        position:absolute;
        bottom:20px;
        right:20px;
        width:200px;
        pointer-events:none;
        z-index:5;
        opacity:0.9;
    }
</style>
</head>
<body>

<div id="menu">
    <h1>Mini FPS</h1>
    <button id="startBtn">START</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>GAME OVER</h1>
    <button onclick="location.reload()">RESTART</button>
</div>

<div id="hud"></div>
<div id="crosshair"></div>

<!-- 🔥 SEM STAČÍ DÁT OBRÁZEK -->
<img id="overlayImg" src="overlay.png">

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';

let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xaaaaaa, 10, 80);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

let clock = new THREE.Clock();

/* světlo */
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
light.castShadow = true;
scene.add(light);

/* podlaha */
let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x777777})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

/* překážky */
let colliders = [];
function addBox(x,z){
    let mesh = new THREE.Mesh(
        new THREE.BoxGeometry(4,4,4),
        new THREE.MeshStandardMaterial({color:0x555555})
    );
    mesh.position.set(x,2,z);
    mesh.castShadow = true;
    scene.add(mesh);
}
for(let i=0;i<15;i++){
    addBox(Math.random()*80-40, Math.random()*80-40);
}

/* player */
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
let keys = {};
let onGround = false;

document.addEventListener('keydown', e=>keys[e.code]=true);
document.addEventListener('keyup', e=>keys[e.code]=false);

let yaw=0,pitch=0;

document.getElementById('startBtn').onclick = ()=>{
    document.body.requestPointerLock();
    document.getElementById('menu').style.display="none";
    audioCtx = new AudioContext();
};

document.addEventListener('mousemove', e=>{
    if(document.pointerLockElement){
        yaw -= e.movementX*0.002;
        pitch -= e.movementY*0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2,pitch));
    }
});

/* zbraň */
let gun = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.3,1),
    new THREE.MeshStandardMaterial({color:0x222222})
);
gun.position.set(0.5,-0.5,-1);
camera.add(gun);
scene.add(camera);

let ammo=30;
let recoil=0;

/* flash */
let flash = new THREE.PointLight(0xffaa55,0,5);
camera.add(flash);

/* audio */
let audioCtx;
function shootSound(){
    let o=audioCtx.createOscillator();
    o.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime+0.05);
}

/* enemies */
let enemies=[];
function spawn(){
    let e = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({color:0xff0000})
    );
    e.position.set(Math.random()*40-20,1,Math.random()*40-20);
    scene.add(e);
    enemies.push(e);
}
for(let i=0;i<5;i++) spawn();

/* střelba */
let raycaster = new THREE.Raycaster();
document.addEventListener('mousedown', ()=>{
    if(!document.pointerLockElement) return;
    if(ammo<=0) return;

    ammo--;
    recoil=0.2;
    flash.intensity=2;
    shootSound();

    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    let hit = raycaster.intersectObjects(enemies);
    if(hit.length){
        let obj = hit[0].object;
        scene.remove(obj);
        enemies.splice(enemies.indexOf(obj),1);
    }
});

/* loop */
let hp=100;

function animate(){
    requestAnimationFrame(animate);
    let dt = clock.getDelta();

    camera.rotation.order="YXZ";
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;

    direction.set(0,0,0);
    if(keys['KeyW']) direction.z-=1;
    if(keys['KeyS']) direction.z+=1;
    if(keys['KeyA']) direction.x-=1;
    if(keys['KeyD']) direction.x+=1;

    direction.normalize();

    let forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    let right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

    velocity.x = (forward.x*direction.z + right.x*direction.x)*10;
    velocity.z = (forward.z*direction.z + right.z*direction.x)*10;

    velocity.y -= 20*dt;

    if(onGround && keys['Space']){
        velocity.y=8;
        onGround=false;
    }

    camera.position.addScaledVector(velocity,dt);

    if(camera.position.y<1.8){
        camera.position.y=1.8;
        velocity.y=0;
        onGround=true;
    }

    gun.position.z = -1 - recoil;
    recoil *= 0.9;
    flash.intensity *= 0.5;

    enemies.forEach(e=>{
        let dir = camera.position.clone().sub(e.position).normalize();
        e.position.addScaledVector(dir, dt*2);
        if(e.position.distanceTo(camera.position)<1.5){
            hp-=20*dt;
        }
    });

    document.getElementById('hud').innerHTML =
        `HP: ${hp.toFixed(0)}<br>Ammo: ${ammo}`;

    if(hp<=0){
        document.getElementById('gameOver').style.display="flex";
        return;
    }

    renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
