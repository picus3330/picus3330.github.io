<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jewish 3D Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/controls/PointerLockControls.js"></script>
    <script>
        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x20252f);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // --- Floor ---
        const floorGeometry = new THREE.PlaneGeometry(50, 50);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- Player (Camera Control) ---
        const controls = new THREE.PointerLockControls(camera, renderer.domElement);
        document.body.addEventListener('click', () => controls.lock());

        camera.position.set(0, 1.6, 5); // player height

        // --- Player Movement ---
        const move = { forward: false, backward: false, left: false, right: false };
        const velocity = new THREE.Vector3();
        const speed = 0.1;

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') move.forward = true;
            if(e.code === 'KeyS') move.backward = true;
            if(e.code === 'KeyA') move.left = true;
            if(e.code === 'KeyD') move.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') move.forward = false;
            if(e.code === 'KeyS') move.backward = false;
            if(e.code === 'KeyA') move.left = false;
            if(e.code === 'KeyD') move.right = false;
        });

        // --- Collectibles ---
        const collectibles = [];
        const collectibleGeometry = new THREE.CylinderGeometry(0, 0.3, 0.5, 4); // dreidel-like
        const collectibleMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffff });

        for(let i=0; i<10; i++){
            const collectible = new THREE.Mesh(collectibleGeometry, collectibleMaterial);
            collectible.position.set((Math.random()-0.5)*40, 0.25, (Math.random()-0.5)*40);
            scene.add(collectible);
            collectibles.push(collectible);
        }

        let score = 0;
        const scoreDiv = document.getElementById('score');

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Movement
            velocity.set(0,0,0);
            if(move.forward) velocity.z -= speed;
            if(move.backward) velocity.z += speed;
            if(move.left) velocity.x -= speed;
            if(move.right) velocity.x += speed;
            controls.moveRight(velocity.x);
            controls.moveForward(velocity.z);

            // Check collectibles
            collectibles.forEach((c, idx) => {
                if(c.position.distanceTo(camera.position) < 1){
                    scene.remove(c);
                    collectibles.splice(idx, 1);
                    score++;
                    scoreDiv.innerText = `Score: ${score}`;
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
