<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>JS:GO - Full Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* UI Overlay */
        #hud {
            position: absolute; bottom: 30px; left: 30px;
            color: #ffcc00; font-size: 28px; font-weight: bold;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
        #ammo-display { position: absolute; bottom: 30px; right: 30px; color: #ffcc00; font-size: 40px; text-shadow: 2px 2px #000; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px; border: 2px solid rgba(0, 255, 0, 0.8);
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: -5px; width: 24px; height: 2px; background: rgba(0, 255, 0, 0.5); }
        #crosshair::after { content: ''; position: absolute; left: 50%; top: -5px; width: 2px; height: 24px; background: rgba(0, 255, 0, 0.5); }

        #minimap {
            position: absolute; top: 20px; right: 20px;
            width: 150px; height: 150px; background: rgba(0,0,0,0.5);
            border: 2px solid #555; border-radius: 50%; overflow: hidden;
        }

        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 100;
        }

        .btn {
            padding: 15px 40px; font-size: 24px; background: #de9b35; border: none;
            color: white; cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        .btn:hover { background: #ffaa00; transform: scale(1.1); }

        #flash-bang {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 50;
        }
    </style>
</head>
<body>

<div id="flash-bang"></div>
<div id="crosshair"></div>
<div id="hud">HP: <span id="hp">100</span> | KILLS: <span id="kills">0</span> | WAVE: <span id="wave">1</span></div>
<div id="ammo-display">30 / 90</div>

<div id="menu">
    <h1 style="font-size: 80px; margin-bottom: 10px;">JS:GO</h1>
    <p style="margin-bottom: 30px; color: #ccc;">Zlikviduj všechny boty. Přežij co nejdéle.</p>
    <button class="btn" onclick="startGame()">SPUSTIT HRU</button>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- HERNÍ PROMĚNNÉ ---
    let hp = 100, kills = 0, wave = 1, ammo = 30, maxAmmo = 30;
    let gameActive = false;
    const enemies = [];
    const bullets = [];
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    scene.fog = new THREE.Fog(0x1a1a1a, 10, 60);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- ZVUKY (AudioContext) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- SVĚTLO A MAPA ---
    const ambient = new THREE.AmbientLight(0x404040, 2);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(20, 50, 10);
    sun.castShadow = true;
    scene.add(sun);

    // Podlaha s texturou (grid)
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Budovy a překážky
    function createWall(x, z, w, h, d) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({color: 0x444444}));
        mesh.position.set(x, h/2, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
    }
    // "De_Dust" styl
    for(let i=0; i<15; i++) {
        createWall(Math.random()*80-40, Math.random()*80-40, 4, 4, 4);
    }

    // --- ZBRAŇ ---
    const gunPivot = new THREE.Group();
    const gunModel = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.6), new THREE.MeshPhongMaterial({color: 0x050505}));
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.2), new THREE.MeshPhongMaterial({color: 0x111111}));
    barrel.rotation.x = Math.PI/2;
    barrel.position.z = -0.35;
    gunModel.add(body, barrel);
    gunModel.position.set(0.3, -0.3, -0.5);
    gunPivot.add(gunModel);
    camera.add(gunPivot);
    scene.add(camera);

    // --- NEPŘÁTELÉ ---
    function spawnWave() {
        for(let i = 0; i < wave * 3; i++) {
            const enemy = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshPhongMaterial({color: 0xaa0000}));
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshPhongMaterial({color: 0x555555}));
            head.position.y = 0.8;
            enemy.add(body, head);
            enemy.position.set(Math.random()*100-50, 1, Math.random()*100-50);
            enemy.userData = { hp: 100, speed: 0.03 + (wave * 0.005) };
            enemies.push(enemy);
            scene.add(enemy);
        }
    }

    // --- OVLÁDÁNÍ ---
    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('mousemove', e => {
        if(document.pointerLockElement) {
            camera.rotation.y -= e.movementX * 0.002;
            camera.rotation.x -= e.movementY * 0.002;
            camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
        }
    });

    window.startGame = () => {
        audioCtx.resume();
        document.body.requestPointerLock();
        document.getElementById('menu').style.display = 'none';
        gameActive = true;
        spawnWave();
    };

    function shoot() {
        if(ammo <= 0) { playSound(100, 'square', 0.1); return; }
        ammo--;
        document.getElementById('ammo-display').innerText = `${ammo} / 90`;
        playSound(400, 'sawtooth', 0.1);
        
        // Recoil
        gunModel.position.z += 0.1;
        
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera({x:0, y:0}, camera);
        const intersects = raycaster.intersectObjects(enemies, true);

        if(intersects.length > 0) {
            let target = intersects[0].object.parent;
            target.userData.hp -= 50;
            if(target.userData.hp <= 0) {
                scene.remove(target);
                enemies.splice(enemies.indexOf(target), 1);
                kills++;
                document.getElementById('kills').innerText = kills;
                if(enemies.length === 0) {
                    wave++;
                    document.getElementById('wave').innerText = wave;
                    spawnWave();
                }
            }
        }
    }

    document.addEventListener('mousedown', () => { if(gameActive) shoot(); });

    // --- GAME LOOP ---
    const clock = new THREE.Clock();
    function update() {
        requestAnimationFrame(update);
        const delta = clock.getDelta();
        if(!gameActive || !document.pointerLockElement) return;

        // Pohyb
        const speed = 0.15;
        if(keys['KeyW']) camera.translateZ(-speed);
        if(keys['KeyS']) camera.translateZ(speed);
        if(keys['KeyA']) camera.translateX(-speed);
        if(keys['KeyD']) camera.translateX(speed);
        camera.position.y = 1.6 + Math.sin(Date.now() * 0.01) * 0.02; // Head bobbing

        // Zbraň lerp
        gunModel.position.z += ( -0.5 - gunModel.position.z ) * 0.1;

        // Nepřátelé AI
        enemies.forEach(en => {
            en.lookAt(camera.position.x, 1, camera.position.z);
            en.translateZ(en.userData.speed);
            
            // Kolize s hráčem
            if(en.position.distanceTo(camera.position) < 1.5) {
                hp -= 0.2;
                document.getElementById('hp').innerText = Math.ceil(hp);
                if(hp <= 0) location.reload(); // Game Over
            }
        });

        renderer.render(scene, camera);
    }

    update();
</script>
</body>
</html>
