name: Update Frontline Data

on:
  schedule:
    # Every day at 04:30 UTC
    - cron: '30 4 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest frontline GeoJSON
        run: |
          set -e
          BASE="https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/data"
          
          # This loop checks the last 7 days for the most recent available file
          for i in {0..7}; do
            DATE=$(date -u -d "$i days ago" +%Y-%m-%d)
            URL="${BASE}/deepstatemap_data_${DATE}.geojson"
            echo "Checking: $URL"
            
            HTTP_CODE=$(curl -s -o /tmp/frontline_new.geojson -w "%{http_code}" "$URL")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Success: fetched data for $DATE"
              echo "{\"fetched_date\": \"$DATE\", \"source\": \"cyterat/deepstate-map-data\", \"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json
              cp /tmp/frontline_new.geojson data/frontline.geojson
              break
            else
              echo "Not found for $DATE (HTTP $HTTP_CODE)"
            fi
          done

          if [ ! -s data/frontline.geojson ]; then
            echo "ERROR: Could not fetch any valid GeoJSON in the last 7 days"
            exit 1
          fi

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/frontline.geojson data/meta.json
          # Only commit and push if there are actual changes to the data
          if ! git diff --staged --quiet; then
            git commit -m "chore: update frontline data $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes detected in data."
          fi
