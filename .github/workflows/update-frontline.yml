name: Update Frontline Data

on:
  schedule:
    # Every day at 04:30 UTC (after cyterat updates at 03:00 UTC)
    - cron: '30 4 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest frontline GeoJSON
        run: |
          set -e
          BASE="https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/data"

          # Format: YYYYMMDD — no dashes! (e.g. deepstatemap_data_20260407.geojson)
          for OFFSET in 0 1 2 3; do
            DATE=$(date -u -d "${OFFSET} days ago" +%Y%m%d)
            URL="${BASE}/deepstatemap_data_${DATE}.geojson"
            echo "Trying: $URL"
            HTTP=$(curl -s -o /tmp/frontline_new.geojson -w "%{http_code}" "$URL")
            if [ "$HTTP" = "200" ]; then
              echo "✓ Fetched data for $DATE"
              cp /tmp/frontline_new.geojson data/frontline.geojson
              echo "{\"fetched_date\":\"${DATE}\",\"source\":\"cyterat/deepstate-map-data\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json
              break
            fi
            echo "  Not found (HTTP $HTTP)"
          done

          [ -f data/frontline.geojson ] && [ "$(wc -c < data/frontline.geojson)" -gt 100 ] || { echo "ERROR: No data fetched"; exit 1; }
          echo "File size: $(wc -c < data/frontline.geojson) bytes"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/frontline.geojson data/meta.json
          git diff --staged --quiet || git commit -m "chore: update frontline data $(date -u +%Y-%m-%d)"
          git push
